name: Deploy Dental Studio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Backup on Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 65002
          timeout: 80s
          command_timeout: 10m
          script: |
            mkdir -p ~/backups
            cd domains/rozetka.space/public_html && tar -czf ~/backups/dental_studio_$(date +%Y%m%d_%H%M%S).tar.gz . --exclude='./backups' || echo "Backup skipped"

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 65002
          timeout: 60s
          source: "."
          target: "domains/rozetka.space/public_html"
