name: Deploy Dental Studio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: uashared43.twinservers.net
          username: holiday8
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dentstudio.in.ua/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
         
