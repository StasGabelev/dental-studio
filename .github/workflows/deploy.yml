name: Deploy Dental Studio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (server pulls from GitHub)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 65002
          timeout: 300s
          command_timeout: 20m
          script: |
            cd ~/domains/rozetka.space/public_html
            wget -q "https://github.com/StasGabelev/dental-studio/archive/refs/heads/main.tar.gz" -O /tmp/ds_deploy.tar.gz
            tar -xzf /tmp/ds_deploy.tar.gz --strip-components=1 -C ~/domains/rozetka.space/public_html/ dental-studio-main/
            rm -f /tmp/ds_deploy.tar.gz
            echo "Deploy complete!"
