name: Deploy Dental Studio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 65002
          timeout: 300s
          command_timeout: 20m
          script: |
            set -e
            TARGET=~/domains/rozetka.space/public_html
            TMP=/tmp/ds_deploy_$(date +%s).tar.gz

            echo "Downloading from GitHub..."
            wget -q "https://github.com/StasGabelev/dental-studio/archive/refs/heads/main.tar.gz" -O $TMP

            echo "Extracting..."
            tar -xzf $TMP --strip-components=1 -C $TARGET dental-studio-main/

            echo "Cleanup..."
            rm -f $TMP

            echo "✅ Deploy complete!"
