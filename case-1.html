<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керамічні вініри — Dental Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main class="page-container">
        <!-- Hero Case -->
        <section class="case-hero">
            <div class="case-hero__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/MelnykAnna/preview.jpg')"></div>
            <div class="case-hero__content">
                <h1 class="case-title-main">КЕРАМІЧНІ ВІНІРИ</h1>
                <a href="#form" class="btn btn--cta btn--xl">ЗАПИСАТИСЯ НА КОНСУЛЬТАЦІЮ</a>
            </div>
        </section>

        <!-- Treatment Plan -->
        <section class="treatment-plan">
            <div class="container-full">
                <h2 class="section-title">ЕТАПИ ЛІКУВАННЯ</h2>
                <div class="plan-grid">
                    <div class="plan-item">
                        <span class="plan-cat">ОРТОДОНТІЯ</span>
                        <p class="plan-desc">Лікування брекет-системою</p>
                    </div>
                    <div class="plan-item">
                        <span class="plan-cat">ХІРУРГІЯ</span>
                        <p class="plan-doctor">АНАТОЛІЙ ТОКАР</p>
                        <p class="plan-desc">Видовження ясен</p>
                    </div>
                    <div class="plan-item">
                        <span class="plan-cat">ОРТОПЕДІЯ</span>
                        <p class="plan-doctor">АНАТОЛІЙ ТОКАР</p>
                        <p class="plan-desc">Керамічні вініри</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Before / After -->
        <section class="case-results">
            <div class="container-full">
                <h2 class="section-title">РЕЗУЛЬТАТ ЛІКУВАННЯ</h2>
                <div class="results-grid">
                    <div class="result-img-box">
                        <img src="https://storage.googleapis.com/tokar_clinic_site/patients/MelnykAnna/before.jpg" alt="До">
                        <span class="label">ДО</span>
                    </div>
                    <div class="result-img-box">
                        <img src="https://storage.googleapis.com/tokar_clinic_site/patients/MelnykAnna/after.jpg" alt="ПІСЛЯ">
                        <span class="label">ПІСЛЯ</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Gallery of process -->
        <section class="process-gallery">
            <div class="container--narrow">
                <div class="process-images">
                    <img src="https://storage.googleapis.com/tokar_clinic_site/patients/MelnykAnna/ortho_process.jpg" alt="Процес">
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="dynamic-content.js"></script>
    <script src="chat-widget.js"></script>
</body>
</html>
