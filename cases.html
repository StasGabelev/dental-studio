<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cases-page-title">Наші роботи — Dental Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main class="page-container">
        <section class="cases-page">
            <div class="container-full">
                <h1 class="page-title" data-i18n="cases-hero-title">НАШІ РОБОТИ</h1>
                
                <div class="filters-wrap">
                    <div class="filters-scroll">
                        <button class="filter-btn active" data-filter="all" data-i18n="filter-all">Всі роботи</button>
                        <button class="filter-btn" data-filter="veneers" data-i18n="filter-veneers">Керамічні вініри</button>
                        <button class="filter-btn" data-filter="composite" data-i18n="filter-composite">Композитні вініри</button>
                        <button class="filter-btn" data-filter="restoration" data-i18n="filter-restoration">Композитні реставрації</button>
                        <button class="filter-btn" data-filter="implants" data-i18n="filter-implants">Імплантація</button>
                        <button class="filter-btn" data-filter="ortho" data-i18n="filter-ortho">Ортодонтія</button>
                        <button class="filter-btn" data-filter="whitening" data-i18n="filter-whitening">Відбілювання зубів</button>
                    </div>
                </div>

                <div class="cases-grid">
                    <!-- Case 1 -->
                    <div class="case-card" data-category="veneers" onclick="location.href='case-1.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/MelnykAnna/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-veneers">Керамічні вініри</span>
                        </div>
                    </div>
                    <!-- Case 2 -->
                    <div class="case-card" data-category="veneers" onclick="location.href='case-2.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/ShmakovaTania/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-veneers">Керамічні вініри</span>
                        </div>
                    </div>
                    <!-- Case 3 -->
                    <div class="case-card" data-category="veneers" onclick="location.href='case-3.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/FlurkoSergiy/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-veneers">Керамічні вініри</span>
                        </div>
                    </div>
                    <!-- Case 4 -->
                    <div class="case-card" data-category="composite" onclick="location.href='case-4.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/PavlykIra/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-composite">Композитні вініри</span>
                        </div>
                    </div>
                    <!-- Case 5 -->
                    <div class="case-card" data-category="ortho" onclick="location.href='case-5.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/TokarMaria/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-ortho">Ортодонтія</span>
                        </div>
                    </div>
                    <!-- Case 6 -->
                    <div class="case-card" data-category="restoration" onclick="location.href='case-6.html'">
                        <div class="case-card__img" style="background-image: url('https://storage.googleapis.com/tokar_clinic_site/patients/DenysovaOlena/preview.jpg')"></div>
                        <div class="case-card__overlay">
                            <span data-i18n="filter-restoration">Композитні реставрації</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="translations.js"></script>
    <script src="components.js"></script>
    <script>
        // Simple filter logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                
                const filter = btn.getAttribute('data-filter');
                document.querySelectorAll('.case-card').forEach(card => {
                    if (filter === 'all' || card.getAttribute('data-category') === filter) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    </script>
    <script src="dynamic-content.js"></script>
    <script src="chat-widget.js"></script>
</body>
</html>
