<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cases-page-title">Наші роботи — Dental Studio</title>
    <link rel="stylesheet" href="styles.css?v=v1.31.7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main class="page-container">
        <section class="cases-page">
            <div class="container-full">
                <h1 class="page-title reveal" data-i18n="cases-hero-title">НАШІ РОБОТИ</h1>
                
                <div class="filters-wrap">
                    <div class="filters-scroll">
                        <button class="filter-btn active" data-filter="all" data-i18n="filter-all">Усі роботи</button>
                        <button class="filter-btn" data-filter="veneers" data-i18n="filter-veneers">Керамічні вініри</button>
                        <button class="filter-btn" data-filter="composite-veneers" data-i18n="filter-composite-veneers">Композитні вініри</button>
                        <button class="filter-btn" data-filter="restorations" data-i18n="filter-restorations">Композитні реставрації</button>
                        <button class="filter-btn" data-filter="caries" data-i18n="filter-caries">Лікування карієсу</button>
                        <button class="filter-btn" data-filter="endo" data-i18n="filter-endo">Лікування кореневих каналів</button>
                        <button class="filter-btn" data-filter="periodontal" data-i18n="filter-periodontal">Пародонтологічне лікування</button>
                        <button class="filter-btn" data-filter="implants" data-i18n="filter-implants">Імплантація</button>
                        <button class="filter-btn" data-filter="recessions" data-i18n="filter-recessions">Закриття рецесій</button>
                        <button class="filter-btn" data-filter="gum-extension" data-i18n="filter-gum-extension">Видовження ясен</button>
                        <button class="filter-btn" data-filter="braces" data-i18n="filter-braces">Лікування брекет-системою</button>
                        <button class="filter-btn" data-filter="aligners" data-i18n="filter-aligners">Лікування елайнерами</button>
                        <button class="filter-btn" data-filter="whitening" data-i18n="filter-whitening">Відбілювання зубів</button>
                        <button class="filter-btn" data-filter="military" data-i18n="filter-military">Лікування військовослужбовців</button>
                    </div>
                </div>

                <div class="cases-grid">
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px 0;" id="cases-loading">
                        <div class="spinner" style="margin: 0 auto;"></div>
                        <p style="margin-top: 20px; font-family: var(--font-sans); letter-spacing: 2px; font-size: 11px; color: #888;">ЗАВАНТАЖЕННЯ РОБІТ...</p>
                    </div>
                </div>
            </div>
        </section>
        <!-- ═══════════════════════════════════════
             CONTACT CHOICE SECTION
        ═══════════════════════════════════════ -->
        <section id="contact-choice" class="appointment" style="padding: 100px 0; background: #fff; border-top: 1px solid rgba(0,0,0,0.03);">
            <div class="container--narrow">
                <div class="appointment__inner reveal" style="text-align: center;">
                    <h2 class="section-title-alt" style="margin-bottom: 24px;">ЗАПИСАТИСЯ НА КОНСУЛЬТАЦІЮ</h2>
                    <p class="appointment-subtitle" style="margin-bottom: 48px; color: #888; font-size: 14px; letter-spacing: 1.5px; line-height: 1.8;">
                        Виберіть онлайн-запис для миттєвого бронювання часу,<br>або напишіть нам у месенджер для консультації.
                    </p>
                    <div style="display: flex; flex-direction: column; gap: 16px; align-items: center; width: 100%; max-width: 440px; margin: 0 auto;">
                        <button onclick="openOnlineBooking()" class="btn btn--cta" style="width: 100%; padding: 22px; font-size: 12px; font-family: var(--font-sans); letter-spacing: 2px; text-transform: uppercase; cursor: pointer;">ОНЛАЙН ЗАПИС</button>
                        <button onclick="openContactHub()" style="width: 100%; padding: 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); letter-spacing: 2.5px; text-transform: uppercase; font-size: 11px; cursor: pointer; font-family: var(--font-sans); transition: all 0.3s ease;">ЗВ'ЯЗАТИСЯ З НАМИ</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="translations.js?v=v1.31.7"></script>
    <script src="components.js?v=v1.31.7"></script>
    <script src="main.js?v=v1.31.7"></script>

    <!-- Supabase & Dynamic Content Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="dynamic-content.js?v=v1.31.7"></script>
    <script src="chat-widget.js?v=v1.31.7"></script>
    <!-- Cases loaded dynamically via dynamic-content.js -->
</body>
</html>
