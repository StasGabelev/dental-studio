<section class="callback-section" id="callback-section">
    <div class="container--narrow">
        <div class="callback-inner">
            <p class="section-tag" data-i18n="callback-tag">ЗВОРОТНІЙ ЗВ'ЯЗОК</p>
            <h2 class="callback-title" data-i18n="callback-title">ЗАМОВИТИ ДЗВІНОК</h2>
            <p class="callback-subtitle" data-i18n="callback-subtitle">Залиште свій номер — ми передзвонимо вам протягом 30 хвилин</p>
            <form class="callback-form" id="callbackForm" onsubmit="submitCallbackForm(event)">
                <input type="text" id="callback-name" class="callback-input" data-i18n="callback-name-placeholder" placeholder="Ваше ім'я" required>
                <input type="tel" id="callback-phone" class="callback-input" data-i18n="callback-phone-placeholder" placeholder="Номер телефону" required>
                <button type="submit" class="callback-btn" data-i18n="callback-btn">ПЕРЕДЗВОНІТЬ МЕНІ</button>
            </form>
            <p class="callback-success" id="callbackSuccess" style="display:none;" data-i18n="callback-success">✓ Дякуємо! Ми зв'яжемося з вами найближчим часом.</p>
        </div>
    </div>
</section>
