<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="contacts-page-title">Контакти — Dental Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main class="page-container">
        <section class="contact-hero">
            <div class="container--narrow">
                <div class="contact-form-wrap">
                    <h1 class="section-title-alt" data-i18n="form-title">ЗАПИСАТИСЯ НА КОНСУЛЬТАЦІЮ</h1>
                    <p class="contact-subtitle" data-i18n="form-subtitle">Залишіть заявку й адміністратор зв'яжеться з Вами, або зателефонуйте нам особисто</p>
                    <div class="contact-direct-call">
                        <span data-i18n="form-phone-label">Зв'язатися з нами для консультації:</span>
                        <a href="tel:+380776007800" class="btn--call">(077) 600 7 800 ЗАТЕЛЕФОНУВАТИ</a>
                    </div>

                    <form class="appointment-form contact-page-form">
                        <div class="form-cols">
                            <input type="text" placeholder="Прізвище та ім'я" data-i18n="form-name-placeholder" required>
                            <textarea placeholder="Коментар" data-i18n="form-comment-placeholder"></textarea>
                        </div>
                        <div class="form-cols">
                            <input type="tel" placeholder="Номер телефону" data-i18n="form-phone-placeholder" required>
                        </div>
                        <div class="form-checkbox">
                            <input type="checkbox" id="privacy-contact" checked required>
                            <label for="privacy-contact" data-i18n="form-privacy">Погоджуюся на обробку персональних даних та з умовами політики конфіденційності</label>
                        </div>
                        <button type="submit" class="btn btn--cta btn--xl btn--submit-contact" data-i18n="form-btn">ЗАПИСАТИСЯ НА КОНСУЛЬТАЦІЮ</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="contact-info-section">
            <div class="container-full">
                <div class="contact-info-grid">
                    <div class="contact-info-box">
                        <h3 class="box-title" data-i18n="footer-find-us">ДЕ НАС ЗНАЙТИ</h3>
                        <p class="box-address" data-i18n="map-address">ВУЛИЦЯ НЕЗАЛЕЖНОСТІ, 21, ЧЕРНІГІВ, УКРАЇНА</p>
                        <a href="https://goo.gl/maps/..." target="_blank" class="btn--map-link" data-i18n="footer-map-btn">ЗНАЙТИ НАС НА КАРТІ</a>
                    </div>
                    <div class="contact-info-box">
                        <h3 class="box-title" data-i18n="footer-hours-title">ГРАФІК РОБОТИ</h3>
                        <p class="box-hours" data-i18n="footer-hours-days">ПН — ПТ, 10:00 — 18:00</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="contact-map-full">
            <div class="map-wrap">
                <!-- Map Placeholder -->
                <div class="map-mask"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="translations.js"></script>
    <script src="components.js"></script>
    <script src="dynamic-content.js"></script>
    <script src="chat-widget.js"></script>
</body>
</html>
